name: Daily Mutual Fund Data Ingestion

on:
  schedule:
    # Run at 9:30 AM IST (4:00 AM UTC) every day
    - cron: '0 4 * * *'
  workflow_dispatch:
    # Allow manual triggering from the GitHub Actions tab

jobs:
  ingest_data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Ensure we can commit back to the repository
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          playwright install --with-deps chromium

      - name: Run Ingestion Pipeline
        run: |
          python scripts/ingest.py --force

      - name: Commit and push updated ChromaDB
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          
          # Only commit and push if there are changes
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "chore(data): auto-update mutual fund database [skip ci]"
            git push
          fi
